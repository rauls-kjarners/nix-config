name: CI
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            attr: .#nixosConfigurations.nixos-wsl.config.system.build.toplevel
          - os: macos-latest
            attr: .#darwinConfigurations.macbook.system
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: DeterminateSystems/nix-installer-action@v22
        with:
          extra-conf: |
            extra-substituters = https://nix-community.cachix.org
            extra-trusted-public-keys = nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=
      - run: nix flake check --print-build-logs
      - run: nix build --print-build-logs "${{ matrix.attr }}"
