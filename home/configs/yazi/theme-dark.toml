# Dracula — dark theme for yazi (current schema, v25.5.28+)
# Palette: bg=#282a36 currentline=#44475a fg=#f8f8f2 comment=#6272a4
#          cyan=#8be9fd green=#50fa7b orange=#ffb86c pink=#ff79c6
#          purple=#bd93f9 red=#ff5555 yellow=#f1fa8c

[mgr]
cwd             = { fg = "#8be9fd" }
hovered         = { bg = "#44475a", bold = true }
preview_hovered = { underline = true }
find_keyword    = { fg = "#f1fa8c", bold = true, italic = true, underline = true }
find_position   = { fg = "#ff79c6", bg = "reset", bold = true, italic = true }
symlink_target  = { fg = "#8be9fd", italic = true }
marker_copied   = { fg = "#f1fa8c", bg = "#f1fa8c" }
marker_cut      = { fg = "#ff5555", bg = "#ff5555" }
marker_marked   = { fg = "#8be9fd", bg = "#8be9fd" }
marker_selected = { fg = "#50fa7b", bg = "#50fa7b" }
count_copied    = { fg = "#282a36", bg = "#f1fa8c" }
count_cut       = { fg = "#282a36", bg = "#ff5555" }
count_selected  = { fg = "#282a36", bg = "#50fa7b" }
border_symbol   = "│"
border_style    = { fg = "#7282b5" }

[tabs]
active   = { fg = "#282a36", bg = "#bd93f9", bold = true }
inactive = { fg = "#bd93f9", bg = "#44475a" }

[mode]
normal_main = { fg = "#282a36", bg = "#bd93f9", bold = true }
normal_alt  = { fg = "#bd93f9", bg = "#44475a" }
select_main = { fg = "#282a36", bg = "#8be9fd", bold = true }
select_alt  = { fg = "#8be9fd", bg = "#44475a" }
unset_main  = { fg = "#282a36", bg = "#ffb86c", bold = true }
unset_alt   = { fg = "#ffb86c", bg = "#44475a" }

[indicator]
parent  = { fg = "#f8f8f2", bg = "#44475a", reversed = false }
current = { fg = "#f8f8f2", bg = "#44475a", reversed = false }
preview = { underline = true }

[status]
perm_sep        = { fg = "#7282b5" }
perm_type       = { fg = "#bd93f9" }
perm_read       = { fg = "#f1fa8c" }
perm_write      = { fg = "#ff5555" }
perm_exec       = { fg = "#50fa7b" }
progress_label  = { fg = "#ffffff", bold = true }
progress_normal = { fg = "#50fa7b", bg = "#63667d" }
progress_error  = { fg = "#f1fa8c", bg = "#ff5555" }

[which]
mask            = { bg = "#44475a" }
cand            = { fg = "#8be9fd" }
rest            = { fg = "#8998c9" }
desc            = { fg = "#ff79c6" }
separator       = "  "
separator_style = { fg = "#83869c" }

[confirm]
border  = { fg = "#bd93f9" }
title   = { fg = "#bd93f9" }
body    = {}
list    = {}
btn_yes = { fg = "#282a36", bg = "#50fa7b", bold = true }
btn_no  = { fg = "#282a36", bg = "#ff5555" }

[spot]
border   = { fg = "#bd93f9" }
title    = { fg = "#bd93f9" }
tbl_col  = { fg = "#8be9fd" }
tbl_cell = { fg = "#ff79c6", bg = "#63667d" }

[notify]
title_info  = { fg = "#50fa7b" }
title_warn  = { fg = "#f1fa8c" }
title_error = { fg = "#ff5555" }

[pick]
border   = { fg = "#bd93f9" }
active   = { fg = "#ff79c6", bold = true }
inactive = {}

[input]
border   = { fg = "#bd93f9" }
title    = {}
value    = {}
selected = { reversed = true }

[cmp]
border   = { fg = "#bd93f9" }
active   = { fg = "#ff79c6", bold = true }
inactive = {}

[tasks]
border  = { fg = "#bd93f9" }
title   = {}
hovered = { fg = "#ff79c6", bold = true }

[help]
on      = { fg = "#8be9fd" }
run     = { fg = "#ff79c6" }
desc    = {}
hovered = { reversed = true, bold = true }
footer  = { fg = "#44475a", bg = "#f8f8f2" }

[filetype]
rules = [
  { mime = "image/*",                                                                                             fg = "#8be9fd" },
  { mime = "{audio,video}/*",                                                                                     fg = "#f1fa8c" },
  { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}",       fg = "#ff79c6" },
  { mime = "application/{pdf,doc,rtf}",                                                                          fg = "#50fa7b" },
  { mime = "vfs/{absent,stale}",                                                                                  fg = "#8998c9" },
  { url = "*", fg = "#f8f8f2" },
  { url = "*/", fg = "#bd93f9" },
]
