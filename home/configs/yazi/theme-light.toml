# Alucard — light theme for yazi (current schema, v25.5.28+)
# Palette: bg=#fffbeb alt=#cfcfde fg=#1f1f1f border=#6c664b
#          blue=#036a96 green=#14710a gold=#846e15 crimson=#a3144d
#          purple=#644ac9 red=#cb3a2a

[mgr]
cwd             = { fg = "#036a96", italic = true }
hovered         = { bg = "#cfcfde", bold = true }
preview_hovered = { underline = true }
find_keyword    = { fg = "#846e15", bold = true, italic = true, underline = true }
find_position   = { fg = "#a3144d", bg = "reset", bold = true, italic = true }
symlink_target  = { fg = "#036a96", italic = true }
marker_copied   = { fg = "#846e15", bg = "#846e15" }
marker_cut      = { fg = "#cb3a2a", bg = "#cb3a2a" }
marker_marked   = { fg = "#036a96", bg = "#036a96" }
marker_selected = { fg = "#14710a", bg = "#14710a" }
count_copied    = { fg = "#fffbeb", bg = "#846e15" }
count_cut       = { fg = "#fffbeb", bg = "#cb3a2a" }
count_selected  = { fg = "#fffbeb", bg = "#14710a" }
border_symbol   = "│"
border_style    = { fg = "#6c664b" }

[tabs]
active   = { fg = "#fffbeb", bg = "#644ac9", bold = true }
inactive = { fg = "#1f1f1f", bg = "#cfcfde" }

[mode]
normal_main = { fg = "#fffbeb", bg = "#644ac9", bold = true }
normal_alt  = { fg = "#644ac9", bg = "#cfcfde" }
select_main = { fg = "#fffbeb", bg = "#14710a", bold = true }
select_alt  = { fg = "#14710a", bg = "#cfcfde" }
unset_main  = { fg = "#fffbeb", bg = "#846e15", bold = true }
unset_alt   = { fg = "#846e15", bg = "#cfcfde" }

[indicator]
parent  = { fg = "#1f1f1f", bg = "#cfcfde", reversed = false }
current = { fg = "#1f1f1f", bg = "#cfcfde", reversed = false }
preview = { underline = true }

[status]
perm_sep        = { fg = "#6c664b" }
perm_type       = { fg = "#644ac9" }
perm_read       = { fg = "#846e15" }
perm_write      = { fg = "#cb3a2a" }
perm_exec       = { fg = "#14710a" }
progress_label  = { fg = "#1f1f1f", bold = true }
progress_normal = { fg = "#14710a", bg = "#cfcfde" }
progress_error  = { fg = "#fffbeb", bg = "#cb3a2a" }

[which]
mask            = { bg = "#cfcfde" }
cand            = { fg = "#036a96" }
rest            = { fg = "#6c664b" }
desc            = { fg = "#a3144d" }
separator       = "  "
separator_style = { fg = "#6c664b" }

[confirm]
border  = { fg = "#644ac9" }
title   = { fg = "#644ac9" }
body    = {}
list    = {}
btn_yes = { fg = "#fffbeb", bg = "#14710a", bold = true }
btn_no  = { fg = "#fffbeb", bg = "#cb3a2a" }

[spot]
border   = { fg = "#644ac9" }
title    = { fg = "#644ac9" }
tbl_col  = { fg = "#036a96" }
tbl_cell = { fg = "#a3144d", bg = "#cfcfde" }

[notify]
title_info  = { fg = "#14710a" }
title_warn  = { fg = "#846e15" }
title_error = { fg = "#cb3a2a" }

[pick]
border   = { fg = "#644ac9" }
active   = { fg = "#a3144d", bold = true }
inactive = {}

[input]
border   = { fg = "#644ac9" }
title    = {}
value    = {}
selected = { reversed = true }

[cmp]
border   = { fg = "#644ac9" }
active   = { fg = "#a3144d", bold = true }
inactive = {}

[tasks]
border  = { fg = "#644ac9" }
title   = {}
hovered = { fg = "#a3144d", bold = true }

[help]
on      = { fg = "#036a96" }
run     = { fg = "#a3144d" }
desc    = {}
hovered = { reversed = true, bold = true }
footer  = { fg = "#1f1f1f", bg = "#cfcfde" }

[filetype]
rules = [
  { mime = "image/*",                                                                                             fg = "#036a96" },
  { mime = "{audio,video}/*",                                                                                     fg = "#846e15" },
  { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}",       fg = "#a3144d" },
  { mime = "application/{pdf,doc,rtf}",                                                                          fg = "#14710a" },
  { mime = "vfs/{absent,stale}",                                                                                  fg = "#6c664b" },
  { url = "*", fg = "#1f1f1f" },
  { url = "*/", fg = "#644ac9" },
]
